name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
  pull_request:
    paths:
      - "skills/**"

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    name: Validate skill files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed skills
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'skills/' \
            | grep -oP '^skills/[^/]+' \
            | sort -u \
            | paste -sd ' ')
          echo "dirs=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set validation targets
        id: targets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changed.outputs.any }}" = "true" ]; then
            echo "paths=${{ steps.changed.outputs.dirs }}" >> "$GITHUB_OUTPUT"
          else
            echo "paths=skills/" >> "$GITHUB_OUTPUT"
          fi

      # --- skill-validator ---

      - name: Install skill-validator
        run: go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@latest
        env:
          GOBIN: /usr/local/bin

      - name: Run skill-validator
        id: skill-validator
        run: |
          EXIT=0
          IFS=' ' read -ra DIRS <<< "${{ steps.targets.outputs.paths }}"
          for dir in "${DIRS[@]}"; do
            [ -z "$dir" ] && continue
            echo "::group::skill-validator — $dir"
            skill-validator check --strict --emit-annotations -o markdown "$dir" \
              >> "$GITHUB_STEP_SUMMARY" || EXIT=$?
            echo "::endgroup::"
          done
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          exit $EXIT

      # --- agnix ---

      - name: Install agnix
        if: always()
        run: npm install -g agnix

      - name: Run agnix
        id: agnix
        if: always()
        run: |
          EXIT=0
          IFS=' ' read -ra DIRS <<< "${{ steps.targets.outputs.paths }}"
          for dir in "${DIRS[@]}"; do
            [ -z "$dir" ] && continue
            echo "::group::agnix — $dir"
            agnix --target claude-code --strict "$dir" || EXIT=$?
            echo "::endgroup::"
          done
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          exit $EXIT

      - name: Generate SARIF
        if: always()
        continue-on-error: true
        run: agnix --target claude-code --format sarif -o agnix-results.sarif skills/

      - name: Upload SARIF
        if: always() && hashFiles('agnix-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: agnix-results.sarif

      - name: Check results
        if: always()
        run: |
          SV="${{ steps.skill-validator.outputs.exit_code }}"
          AG="${{ steps.agnix.outputs.exit_code }}"
          if [ "${SV:-0}" != "0" ] || [ "${AG:-0}" != "0" ]; then
            echo "::error::Validation failed — skill-validator=$SV, agnix=$AG"
            exit 1
          fi
